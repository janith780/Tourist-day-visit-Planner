<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

.card h2 {
    text-align: center;
    margin-bottom: 30px;
}

.input-box {
    position: relative;
    margin-bottom: 25px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.3);
    color: white;
}

.input-box label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #eee;
    transition: 0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px;
    font-size: 12px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: white;
    color: #333;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #ddd;
}

.footer {
    text-align: center;
    margin-top: 15px;
}

.footer a {
    color: white;
    font-weight: bold;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="card">
    <h2>Create Account ✨</h2>

    <form action="../backend/register.php" method="POST">

        <div class="input-box">
            <input type="text" name="name" required>
            <label>Full Name</label>
        </div>

        <div class="input-box">
            <input type="email" name="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit" name="register">Register</button>

        <div class="footer">
            Already have an account? <a href="login.html">Login</a>
        </div>

    </form>
</div>

</body>
</html>
