<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    
}

.card {
    width: 350px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: white;
}

.card h2 {
    text-align: center;
    margin-bottom: 30px;
}

.input-box {
    position: relative;
    margin-bottom: 25px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.3);
    color: white;
    font-size: 14px;
}

.input-box label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #eee;
    pointer-events: none;
    transition: 0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px;
    font-size: 12px;
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #ff4d6d;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffe0e6;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.footer a {
    color: white;
    font-weight: bold;
    text-decoration: none;
}

.top-nav {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 1000;
}

.top-nav a {
    text-decoration: none;
    color: white;
    font-size: 14px;
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
}


</style>

</head>
<body>

<div class="top-nav">
    <a href="welcome.html">🏠 Home</a>
</div>

<div class="card">
    <h2>Welcome Back </h2>

    <form action="../backend/login.php" method="POST">

        <div class="input-box">
            <input type="email" name="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Login</button>

        <div class="footer">
            Don't have an account? <a href="register.html">Register</a>
        </div>

    </form>
</div>

</body>
</html>
